name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS archive
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js (static export → out/)
        run: npm run build

      - name: Capacitor sync (copy web assets to iOS project)
        run: npx cap sync ios

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: |
          gem install cocoapods --no-document
          pod install

      - name: Build iOS archive (unsigned — 証明書は後で設定)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 注意: 署名なしでは正式な .ipa は作れないため、この段階では .xcarchive を artifact に保存する。
      # Apple Developer Program 登録後に証明書 / Provisioning Profile を Secrets に追加し、
      # 下の "Export signed IPA" ステップを有効化してください。
      - name: Upload unsigned archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-unsigned
          path: ios/App/build/App.xcarchive
          retention-days: 14

      # ────────────────────────────────────────────────────────────────
